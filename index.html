<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prachurjya Kalita · Wildlife & GIS Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* CSS remains mostly the same, but added a few smooth transitions */
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: "Inter", sans-serif; background: #0a120c; color: #edf5e8; line-height: 1.7; overflow-x: hidden; }

        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f1f12; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #8bc34a, #4c7a34); border-radius: 10px; }

        /* Navbar Refined */
        nav {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            padding: 12px 25px; border-radius: 50px;
            background: rgba(5, 20, 10, 0.4); backdrop-filter: blur(15px);
            border: 1px solid rgba(200, 240, 150, 0.1); z-index: 1000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        nav.scrolled { top: 10px; background: rgba(2, 15, 5, 0.9); border: 1px solid #aed581; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-links { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
        nav a { color: #dcf2cb; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; text-decoration: none; transition: 0.3s; }
        nav a:hover { color: #aed581; }

        /* Hero & Birds */
        .hero { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        .hero-bg { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,25,10,0.6), #0a120c), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e'); background-size: cover; background-position: center; filter: brightness(0.7); z-index: -1; animation: kenBurns 20s infinite alternate; }
        @keyframes kenBurns { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Rest of your card/gallery styles... (Kept same for brevity) */
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(174, 213, 129, 0.1); border-radius: 30px; padding: 40px; margin-bottom: 40px; transition: 0.4s; }
        .card:hover { border-color: #aed581; transform: translateY(-5px); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .gallery-item { border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid rgba(174,213,129,0.2); transition: 0.3s; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .gallery-item:hover img { transform: scale(1.1); }

        /* Lightbox CSS */
        .lightbox-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .lightbox-content img { max-width: 90%; max-height: 80vh; border-radius: 10px; border: 2px solid #aed581; }
        .close-lightbox { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

<div class="lightbox-modal" id="lightboxModal">
    <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
    <div class="lightbox-content">
        <img id="modalImage" src="" alt="View">
    </div>
</div>

<nav id="navbar">
    <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#field">Fieldwork</a>
        <a href="#maps">Maps</a>
        <a href="#education">Education</a>
        <a href="cv.pdf" target="_blank">CV</a>
    </div>
</nav>

<header class="hero" id="home">
    <div class="hero-bg"></div>
    <div class="hero-content" data-aos="zoom-in">
        <img src="profile.jpg" alt="Prachurjya" class="profile-pic" style="width:180px; height:180px; border-radius:50%; border:3px solid #aed581; margin-bottom:20px;" onerror="this.src='https://via.placeholder.com/180'">
        <h1>Prachurjya Kalita</h1>
        <p style="background: rgba(0,0,0,0.4); padding: 5px 20px; border-radius: 20px;">Geography · Wildlife · GIS</p>
    </div>
</header>

<main style="max-width: 1100px; margin: auto; padding: 40px 20px;">
    <div class="card" id="about" data-aos="fade-up">
        <h2><i class="fas fa-leaf"></i> About Me</h2>
        <p>I am an undergraduate Geography student with a deep academic interest in wildlife research and GIS...</p>
    </div>

    <div class="card" id="field" data-aos="fade-up">
        <h2><i class="fas fa-camera"></i> Fieldwork Photos</h2>
        <div class="gallery-grid">
            <div class="gallery-item" onclick="openLightbox('field1.jpg')"><img src="field1.jpg" onerror="this.src='https://via.placeholder.com/400?text=Field+1'"></div>
            <div class="gallery-item" onclick="openLightbox('field2.jpg')"><img src="field2.jpg" onerror="this.src='https://via.placeholder.com/400?text=Field+2'"></div>
        </div>
    </div>
</main>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // Initialize Animations
    AOS.init({ duration: 1000, once: true });

    // Navbar Scroll Effect
    window.addEventListener('scroll', () => {
        const nav = document.getElementById('navbar');
        if (window.scrollY > 50) nav.classList.add('scrolled');
        else nav.classList.remove('scrolled');
    });

    // Lightbox Logic (Fixed)
    const modal = document.getElementById('lightboxModal');
    const modalImg = document.getElementById('modalImage');

    function openLightbox(src) {
        modal.style.display = "flex";
        modalImg.src = src;
    }

    function closeLightbox() {
        modal.style.display = "none";
    }

    // Close on click outside image
    modal.onclick = function(e) {
        if (e.target === modal) closeLightbox();
    };
</script>

</body>
</html>
